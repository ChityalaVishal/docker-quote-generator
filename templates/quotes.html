<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quote Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='quotes.css') }}">
</head>

<body>

<div class="container">

    <h1>✨ Quote Generator</h1>

    <div class="card">

        <h2>{{ category }}</h2>

        <p class="quote">
            "{{ quote }}"
        </p>

        <button onclick="window.location.reload()">
            Generate New Quote
        </button>

    </div>

</div>

</body>
</html>
