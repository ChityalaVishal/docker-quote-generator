<!DOCTYPE html>
<html>
<head>
    <title>Daily Quote Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            background: white;
            padding: 40px;
            width: 500px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 22px;
            color: #555;
            margin: 30px 0;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00c6fb;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>✨ Daily Quote Generator</h1>

    <p>"{{ quote }}"</p>

    <button onclick="window.location.reload()">
        Generate New Quote
    </button>
</div>

</body>
</html>
