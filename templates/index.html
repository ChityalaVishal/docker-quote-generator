<!DOCTYPE html>
<html>
<head>
    <title>Motivation Hub</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    text-align:center;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

img{
    width:100%;
    border-radius:15px;
    height:450px;
    object-fit:cover;
}

h1{
    color:#38bdf8;
}

.quote{
    font-size:28px;
    margin:20px 0;
    font-style:italic;
}

.category{
    font-size:18px;
    color:#94a3b8;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#0ea5e9;
}
</style>

</head>

<body>

<div class="container">

    <h1>🔥 Quote Generator</h1>

    <div class="card">

        <img src="{{ url_for('static', filename='images/' + image) }}">

        <p class="category">{{ category }} Motivation and more</p>

        <p class="quote">"{{ quote }}"</p>

        <button onclick="window.location.reload()">
            Generate New Motivation
        </button>

    </div>

</div>

</body>
</html>
