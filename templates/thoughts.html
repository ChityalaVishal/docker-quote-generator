<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Share Thoughts</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='thoughts.css') }}">
</head>

<body>

<div class="container">

    <h1>✍ Share Your Thoughts</h1>

    <form method="POST">

        <textarea
            name="thought"
            placeholder="Write your thoughts here..."
            required>
        </textarea>

        <button type="submit">
            Submit Thought 🚀
        </button>

    </form>

    <div class="thoughts-container">

        {% for thought in thoughts %}

        <div class="thought-card">

            {{ thought }}

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
